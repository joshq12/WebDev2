<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>

  <style>
    body {
      background-color: white;
    }

    #container {
      width: 80%;
      margin: 1em auto;
      border: solid green;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
    }

    #inner {
      display: flex;
    }

    #gallery {
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 1em;
      flex-wrap: wrap;
      gap: 2em;
    }

    /* container */
    .img-wrap {
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    /* images */
    .img-wrap img {
      display: block;
      width: 100%;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }


    /* BW image on top */
    .bw {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    /* Hover effect */
    .img-wrap:hover .bw {
      opacity: 1;
      transform: scale(.95);
    }

    #display {
      flex: 1;
      margin: 2em 5em;
      opacity: 1;
      transform: translateY(0) scale(1);
      transition: opacity 0.3s ease, transform 0.3s ease; 
    }

    /* when hiding (slide down) */
   #display.hide {
   opacity: 0;
   transform: translateY(50px) scale(0.97);
}

	
  </style>
</head>

<body>
  <div id="container">
    <header>
      <h1>Art</h1>
    </header>
    <div id="inner">
      <section id="gallery">
        <div class="img-wrap">
          <a href="images/photo1.jpg">
            <img alt="Photo 1" src="images/thumbnails/photo1.jpg" class="color">
            <img alt="Photo 1" src="images/bw/photo1.jpg" class="bw">
          </a>
        </div>
        <div class="img-wrap">
          <a href="images/photo2.jpg">
            <img alt="Photo 2" src="images/thumbnails/photo2.jpg" class="color">
            <img alt="Photo 2" src="images/bw/photo2.jpg" class="bw">
          </a>
        </div>
        <div class="img-wrap">
          <a href="images/photo3.jpg">
            <img alt="Photo 3" src="images/thumbnails/photo3.jpg" class="color">
            <img alt="Photo 3" src="images/bw/photo3.jpg" class="bw">
          </a>
        </div>
        <div class="img-wrap">
          <a href="images/photo4.jpg">
            <img alt="Photo 4" src="images/thumbnails/photo4.jpg" class="color">
            <img alt="Photo 4" src="images/bw/photo4.jpg" class="bw">
          </a>
        </div>
        <div class="img-wrap">
          <a href="images/photo5.jpg">
            <img alt="Photo 5" src="images/thumbnails/photo5.jpg" class="color">
            <img alt="Photo 5" src="images/bw/photo5.jpg" class="bw">
          </a>
        </div>
        <div class="img-wrap">
          <a href="images/photo6.jpg">
            <img alt="Photo 6" src="images/thumbnails/photo6.jpg" class="color">
            <img alt="Photo 6" src="images/bw/photo6.jpg" class="bw">
          </a>
        </div>
      </section>

      <img src="images/photo1.jpg" alt="image" id="display">
    </div>
  </div>

  <script>

let gallery =  document.querySelector('#gallery');
let source = document.querySelector('#display');
let isAnimating = false;

gallery.addEventListener('click', (evt) => {
  if (isAnimating) return;

  const img = evt.target.closest('img');
  if (!img) return;

  evt.preventDefault();

  const link = img.closest('a');
  if (!link) return;

  isAnimating = true;

  source.classList.add('hide');

  setTimeout(() => {
   const newImg = new Image();
   newImg.src = link.href;

   newImg.onload = () => {
     source.src = link.href;
     source.classList.remove('hide');
     isAnimating = false;
   };

   newImg.onerror = () => {
     // fallback: still show something and unlock
     source.classList.remove('hide');
     isAnimating = false;
   };
  }, 300);

});

</script>

</body>

</html>
