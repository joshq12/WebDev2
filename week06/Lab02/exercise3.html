<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Helpers Exercise 3</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
      header {
        text-align: center;
        font-size: 30px;
        margin-bottom: 50px;
      }

      .cards {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }

      .card {
        flex: 0 0 250px;
        margin: 10px;
        border: 1px solid #ccc;
        box-shadow: 2px 2px 6px 0px rgba(0, 0, 0, 0.3);
        transition: 0.3s;
      }
      .card img {
        max-width: 100%;
        margin: 0;
      }
      .card .text {
        padding: 0 20px 10px;
      }
	  
      .card p:nth-of-type(1) {
	    padding-bottom:1em;
	    border-bottom: solid lightgray 1px;
	  }
	  
	  .card p:nth-of-type(2) {
	    color: gray;
	  }

      .card:hover {
        transform: scale(1.1);
      }
    </style>
</head>
<body>

<script id="helpers-exercise-3" type="text/x-handlebars-template">
<div class = "ui container">
<div class="ui centered link cards">
{{#each friends}}
<div class="card">
 <img src={{image}} alt={{name}}>
    <div class="text">
    <h3>{{fullname}}</h3>
    <p>{{name}} is a {{job}} in {{city}} and joined in {{joined}}
     <i> </i> is a <b> </b> in  and joined in  
    </p>
	<p><i class="fa fa-user"></i> {{mates}} Friends</p>
  </div>
</div>
 {{/each}}
</div>
</div>

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>

</body>
</html>
