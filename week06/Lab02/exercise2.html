<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  <title>Helpers Exercise 2</title>
</head>
<body>
<div id="output"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
<script id="comment-template" type="text/x-handlebars-template">
<p>{{name}} on {{date}}</p>

<p>{{{comment}}}</p>

<h2>Social media</h2>

<ul>
{{#each social}}
  <li>{{site}} - username:{{name}}</li>
{{/each}}
</ul>
</script>
<script>
const data = {
  name: "Jack",
  date: "12/03/25",
  comment: "This is a really <strong>awesome</strong> tutorial. Thanks.",
  social: [
    {
      site: "Twitter",
      name: "Jack_Franklin"
    },
    {
      site: "Github",
      name: "jackfranklin"
    }
  ]
}
const source = document.getElementById("comment-template").innerHTML
const template = Handlebars.compile(source)
const html = template(data)
document.getElementById("output").innerHTML = html
</script>
</body>
</html>
