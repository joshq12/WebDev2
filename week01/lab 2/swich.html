 <body>
 <h1>Switch Statement</h2>
 <p>Look in the console for output</p>
 <script>
    let ans=prompt("What coulor lights do","");
switch (ans)
{
case "red":
  console.log(`when red stop`);
  break;
case "yellow":
  console.log(`when yellow slow down`);
  break;
case "green":
   console.log(`when green go`);
default:
  console.log(`You like ${ans}s`);
}
 </script>
 </body>
