<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hover</title>
  <style>
    #myDiv {
      width: 200px;
      height: 200px;
      background-color: lightgray;
    }
  </style>
</head>

<body>
  <h1>Hover</h1>

  <div id="myDiv"></div>

  <script>
    const element = document.querySelector('div')
    element.addEventListener(`mouseenter`, (evt)=>element.style.backgroundColor = "green")

    element.addEventListener(`mouseleave`, (evt)=>element.style.backgroundColor = "lightgrey")

    element.innerHTML = '<p class="red">The quick brown fox ...</p>'





  </script>
</body>
</html>
