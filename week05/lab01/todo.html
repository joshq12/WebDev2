<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>To Do List</title>
</head>

<body>
<h1>To Do List</h1>
<p></p>
<script>

let todos = ["study", "exercise", "cook"];
let para = document.querySelector('p');
para.insertAdjacentHTML('beforeend',`${todos.join(", ")}<br>`);

todos.push("relax", "sleep")
para.insertAdjacentHTML('beforeend',`${todos.join(", ")}<br>`);

todos.unshift("Wake up", "Walk")
para.insertAdjacentHTML('beforeend',`${todos.join(", ")}<br>`);


todos.pop();
para.insertAdjacentHTML('beforeend', `${todos.join(", ")}<br>`);

todos.shift();
para.insertAdjacentHTML('beforeend',`${todos.join(", ")}<br>`);

todos[1] = "read";
para.insertAdjacentHTML("beforeend", `${todos.join(", ")}<br>`);

todos.splice(2, 0, "meditate");
para.insertAdjacentHTML("beforeend", `${todos.join(", ")}<br>`);
</script>
</body>
</html>
