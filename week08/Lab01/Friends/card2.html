<body>
<div id  = "container">
  <h1>My Friends</h1>

<script id="search" type="text/x-handlebars-template">

      <div class="ui centered link cards">
        {{#each this}}
          <div class="card">
            <img src="{{image}}" alt="{{name}}">
            <div class="text">
              <h3>{{fullname}}</h3>
              <p>
                <i>{{name}}</i>
                is a
                <b>{{job}}</b>
                in
                {{city}}
                and joined in
                {{joined}}
              </p>
              <p><i class="fa fa-user"></i> {{mates}} Friends</p>
            </div>
          </div>
        {{/each}}
      </div>
      
    </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>

	const renderTemplate = (data, targetSelector) => {
      const output = template(data);
      const target = document.querySelector(targetSelector);
      return target.innerHTML = output;
	}
	

   const  findaFriend = (evt) =>{
let selectedCity = sel.value;
let filtered = friends.filter(friend => 
	             friend.city.toLowerCase().startsWith(selectedCity.trim().toLowerCase()))

               renderTemplate(filtered, `#cards`);
};


	
    let template = Handlebars.compile(
        document.querySelector("#search").innerHTML,
    );
	renderTemplate(friends, '#cards');

 
	
    const form = document.querySelector('form'); //form
	const sel = form.elements.city; // select menu (city)
		
	const uniqueCities = [...new Set(friends.map(u => u.city))];
	uniqueCities.sort();
	sel.innerHTML = '<option value="all">-- Select a City --</option>';
    uniqueCities.forEach(city => {
        const option = document.createElement('option');
        option.value = city;
        option.textContent = city;
        sel.appendChild(option);
    });




sel.addEventListener("change", findaFriend)
