 <h1>For Loop</h1>
 <p>Look in the console for output</p>
 <script>
    let total =0
    let count =0
for (let num=2; num<=20; num=num+2)
{
  console.log(`${num}`);
  total=total+num
  count++
}
console.log(`the average is${total/count}`)
</script>
