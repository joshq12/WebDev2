<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Math Library</title>
	<style>
		body {
			width: 400px;
			margin: 0 auto;
		}

		p {
			border: solid black 1px;
			height: 20px;
		}
	</style>
</head>

<body>
	<h1>The Math Library</h1>
	<p id="num"></p>
	<p id="area"></p>
	<p id="circumference"></p>
	<button>Circle Calculations</button>
	<script>
		const btn = document.querySelector('button');

		btn.addEventListener('click', () => {
			let radius = parseFloat(prompt("Enter the radius of the circle:"));
		if (isNaN(radius) || radius <= 0) {
				alert("Please enter a valid positive number.");
				return;
			}
		
	let area = Math.PI * Math.pow(radius, 2);
			let circumference = 2 * Math.PI * radius;

			area = area.toFixed(5);
			circumference = circumference.toFixed(5);

			document.querySelector('#num').innerHTML = `The number input is ${radius}`;
			document.querySelector('#area').innerHTML = `The area of the circle is ${area}`;
			document.querySelector('#circumference').innerHTML = `The circumference of the circle is ${circumference}`; 
           });
	</script>
</body>

</html>
