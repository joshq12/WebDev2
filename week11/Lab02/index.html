<!DOCTYPE html>
<html lang="en">

<head>
  <link
  rel="stylesheet"
  href="https://unpkg.com/beerslider/dist/BeerSlider.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <style>
    #container {
      width: 80%;
      margin: 1em auto;
      border: solid black;
      padding: 1em;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>

<body>
  <div id="container">
    <header>
      <h1>Art</h1>
    </header>

   <div id="slider" class="beer-slider" data-beer-label="before">
  <img src="images/before.jpg" alt="">
  <div class="beer-reveal" data-beer-label="after">
    <img src="images/after.jpg" alt="">
  </div>
</div>


  </div>
<script 
  src="https://unpkg.com/beerslider/dist/BeerSlider.js">
</script>
<script>
  new BeerSlider(document.querySelector('#slider'), {
    start: '70',
  });
</script>

</body>

</html>
