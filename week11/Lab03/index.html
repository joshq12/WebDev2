<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link 
  rel="stylesheet" 
  href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/css/lightgallery-bundle.min.css">


    <style>
        body {
            background-color: white;
        }

        #container {
            width: 80%;
            margin: 1em auto;
            border: solid green;
        }

        header {
            text-align: center;
        }

        #gallery {
            display: flex;
            justify-content: space-evenly;
            padding: 1em;
            flex-wrap: wrap;
        }

        #gallery img {
    transition: opacity .8s ease, transform .8s ease;
	opacity: 0.5;
}

#gallery img:hover {
    opacity: 1;
    transform: scale(1.1);
}


    </style>
</head>

<body>
    <div id="container">
        <header>
            <h1>Art</h1>
        </header>

       <section id="gallery">
    <a href="images/photo1.jpg" data-lg-size="600-600">
        <img alt="Photo 1" src="images/thumbnails/photo1.jpg">
    </a>
    <a href="images/photo2.jpg" data-lg-size="600-600">
        <img alt="Photo 2" src="images/thumbnails/photo2.jpg">
    </a>
    <a href="images/photo3.jpg" data-lg-size="600-600">
        <img alt="Photo 3" src="images/thumbnails/photo3.jpg">
    </a>
    <a href="images/photo4.jpg" data-lg-size="600-600">
        <img alt="Photo 4" src="images/thumbnails/photo4.jpg">
    </a>
    <a href="images/photo5.jpg" data-lg-size="600-600">
        <img alt="Photo 5" src="images/thumbnails/photo5.jpg">
    </a>
    <a href="images/photo6.jpg" data-lg-size="600-600">
        <img alt="Photo 6" src="images/thumbnails/photo6.jpg">
    </a>
</section>

    </div>
<script 
  src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/lightgallery.min.js">
</script>
<script 
  src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/thumbnail/lg-thumbnail.min.js">
</script>
<script 
  src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/zoom/lg-zoom.min.js">
</script>
<script 
  src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/fullscreen/lg-fullscreen.min.js">
</script>

<script>
lightGallery(document.querySelector('#gallery'), {
    plugins: [lgZoom, lgThumbnail, lgFullscreen],
    thumbWidth: 80,
    controls: true,
    getCaptionFromTitleOrAlt: true,
    loop : true,
    actualSize: false,
    counter: true,
    fullScreen: true,
    zoom: true,
    mode: 'lg-fade'
});
</script>

</body>

</html>
